<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo - Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login-signup.css" />
    <link rel="stylesheet" href="css/workspace.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="workspace-header">
      <div class="header-container">
        <div class="header-brand">ToDo</div>
        <button id="logoutBtn" class="logout-btn">
          <svg
            class="logout-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </header>

    <!-- Main Workspace Grid Layout -->
    <main class="workspace-container">
      <!-- Top Actions Section -->
      <section class="workspace-actions">
        <div class="actions-title-block">
          <h1>My Workspace</h1>
          <p>Manage your focus and orchestrate your productivity.</p>
        </div>

        <!-- Status Filter Toggles -->
        <div class="filter-group">
          <button data-status="" class="filter-btn active">All</button>
          <button data-status="pending" class="filter-btn">Pending</button>
          <button data-status="done" class="filter-btn">Done</button>
        </div>
      </section>

      <div class="workspace-grid">
        <!-- Left Panel: Task Creation Form -->
        <aside class="sidebar-panel">
          <div class="card-panel">
            <h2>Create Task</h2>
            <form id="taskForm" novalidate>
              <div class="form-group">
                <label for="taskTitle">Title</label>
                <input
                  type="text"
                  id="taskTitle"
                  class="form-input"
                  placeholder="What needs to be done?"
                  maxlength="255"
                />
                <p id="titleError" class="error-text" aria-live="assertive"></p>
              </div>

              <div class="form-group">
                <div class="label-row">
                  <label for="taskDescription">Description</label>
                  <button type="button" id="aiGenBtn" class="ai-btn">
                    <svg
                      class="ai-icon"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                      ></polygon>
                    </svg>
                    <span>Generate via AI</span>
                  </button>
                </div>
                <textarea
                  id="taskDescription"
                  class="form-input form-textarea"
                  placeholder="Add context or use AI to draft details..."
                  rows="4"
                ></textarea>
              </div>

              <button type="submit" class="login-btn">Create Task</button>
            </form>
          </div>
        </aside>

        <!-- Right Panel: Tasks Content List -->
        <section class="content-panel">
          <!-- Dynamic tasks injection container target -->
          <div id="taskContainer" class="task-list-feed"></div>

          <!-- Empty State Graphic Box -->
          <div id="emptyState" class="empty-state-box hidden">
            <div class="empty-icon-circle">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                ></path>
              </svg>
            </div>
            <h3>No tasks found</h3>
            <p>
              Your workspace is clear. Create a new task to start orchestrating
              your day.
            </p>
          </div>

          <!-- Footer Pagination Control Bar -->
          <footer class="pagination-bar">
            <div class="pagination-left">
              <span class="pagination-text" id="paginationInfo"
                >Showing 0 tasks</span
              >
            </div>
            <div class="pagination-direct-controls">
              <div class="limit-selector-group">
                <label for="pageNumberInput" class="pagination-text"
                  >Page:</label
                >
                <input
                  type="number"
                  id="pageNumberInput"
                  class="page-num-input"
                  value="1"
                  min="1"
                />
              </div>
              <div class="limit-selector-group">
                <label for="tasksPerPageSelect" class="pagination-text"
                  >Per page:</label
                >
                <select id="tasksPerPageSelect" class="page-select">
                  <option value="5" selected>5</option>
                  <option value="10">10</option>
                  <option value="25">25</option>
                  <option value="50">50</option>
                </select>
              </div>
            </div>
          </footer>
        </section>
      </div>
    </main>

    <script src="js/services/authService.js"></script>
    <script src="js/services/taskService.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
