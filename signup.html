<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/login-signup.css" />
  </head>
  <body>
    <div class="login-container">
      <main class="login-card">
        <h1 class="login-title">ToDo - Signup</h1>

        <form id="signupForm" novalidate>
          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              class="form-input"
              placeholder="John Doe"
              maxlength="100"
            />
            <p id="nameError" class="error-text" aria-live="assertive"></p>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="name@email.com"
              maxlength="255"
            />
            <p id="emailError" class="error-text" aria-live="assertive"></p>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                class="form-input"
                placeholder="••••••••"
                maxlength="255"
              />
              <button
                type="button"
                id="togglePassword"
                class="toggle-password-btn"
                aria-label="Toggle password visibility"
              >
                <svg
                  id="eyeIcon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>
            <p id="passwordError" class="error-text" aria-live="assertive"></p>
          </div>

          <button type="submit" class="login-btn">Sign Up</button>
        </form>

        <div class="login-footer">
          <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
      </main>
    </div>

    <script src="js/services/authService.js"></script>
    <script src="js/signup.js"></script>
  </body>
</html>
